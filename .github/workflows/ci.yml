name: Workflow CI pipeline

on:
  push:
    paths:
      - 'MLProject/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn numpy

      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ --env-manager=local

      - name: Save run info
        id: run_info
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "run_id=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      - name: Find model artifact path
        run: |
          MODEL_PATH=$(find mlruns -name "MLmodel" | head -1 | xargs dirname)
          echo "model_path=$MODEL_PATH" >> $GITHUB_ENV
          echo "Model path: $MODEL_PATH"

      - name: Build Docker Image
        run: |
          mlflow models build-docker -m ${{ env.model_path }} -n ${{ secrets.DOCKER_USERNAME }}/msml-titanic:latest

      - name: Push Image to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/msml-titanic:latest

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: ${{ env.model_path }}

